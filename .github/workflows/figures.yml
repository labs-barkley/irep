name: Generate figures

on:
  push:
    branches: [main]
    paths:
      - "simulation/*.py"
      - ".github/workflows/figures.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  figures:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: pip install numpy matplotlib
      - name: Generate figures (seeded, reproducible)
        working-directory: simulation
        run: |
          mkdir -p figures
          python make_figures.py
      - name: Commit figures
        run: |
          git config user.name "irep-figures-bot"
          git config user.email "commons@irepprotocol.org"
          git add simulation/figures/*.png
          git diff --cached --quiet || git commit -m "figures: regenerate from make_figures.py (seed 1906)"
          git push
